baseURL = 'https://casualcrochet.com/'
languageCode = 'en-us'
title = 'Casual Crochet'

[params]
  description = "Handmade crochet bag patterns, stitch ideas, and inspiration for crocheters of all levels"
  author = "Duyen Tieu"
  accent_color = "#8B4513"
  enable_animations = true

[menu]
  [[menu.main]]
    identifier = "work"
    name = "Bags"
    url = "/bags/"
    weight = 1
  [[menu.main]]
    identifier = "give-away"
    name = "🔥GIVEAWAY"
    url = "/give-away/"
    weight = 2
  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 3

[outputs]
  home = ["HTML", "RSS", "JSON"]

[outputFormats]
  [outputFormats.RSS]
    mediatype = "application/rss"
    baseName = "feed"

[pagination]
  pagerSize = 12

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[frontmatter]
  # Use date from frontmatter preferentially
  date = [":filename", ":default"]
