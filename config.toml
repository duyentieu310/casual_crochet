baseURL = 'https://casualcrochet.com/'
languageCode = 'en-us'
title = 'Casual Crochet'

[params]
  description = "A casual crochet journal filled with handmade bags, new stitches, and inspiration gathered from nature and everyday life."
  author = "Duyen Tieu"
  # Fillmore-style accent color (customize to match your yarn palette)
  accent_color = "#8B4513"  # Saddle Brown - change as desired
  # Enable smooth transitions
  enable_animations = true

# Menu configuration (Fillmore-style minimal nav)
[menu]
  [[menu.main]]
    identifier = "work"
    name = "Bags"
    url = "/bags/"
    weight = 1
  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 3

[outputs]
  home = ["HTML", "RSS", "JSON"]