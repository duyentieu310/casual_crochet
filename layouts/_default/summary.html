<div class="article-item">
  <h2><a href="{{ .Permalink }}">{{ .Title }}</a></h2>
  {{ if .Params.description }}
    <p class="description">{{ .Params.description }}</p>
  {{ else }}
    {{ .Summary }}
  {{ end }}
  {{ if .Params.tags }}
    <div class="tags">
      {{ range .Params.tags }}
        <span class="tag">#{{ . }}</span>
      {{ end }}
    </div>
  {{ end }}
  <a href="{{ .Permalink }}" class="read-more">Read More →</a>
</div>
